name: CI / Deploy

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          POSTGRES_PRISMA_URL: postgresql://fake:fake@localhost:5432/fake?schema=public&pgbouncer=true
          POSTGRES_URL_NON_POOLING: postgresql://fake:fake@localhost:5432/fake?schema=public
          AUTH_SECRET: ci_auth_secret_placeholder_32chars_ok
          NEXTAUTH_URL: http://localhost:3000

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Verify Vercel auth
        run: vercel whoami --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel project settings and env vars
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (with real production env from Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
